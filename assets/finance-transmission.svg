<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="60" y="60" font-size="30" font-weight="700" fill="#0f172a">金融传导链：从冲突到资产价格</text>
  <text x="60" y="92" font-size="16" fill="#475569">核心不是 headline，而是冲突是否把市场从短期避险推向持续性“再通胀交易”。</text>

  <rect x="70" y="180" width="180" height="120" rx="18" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="108" y="228" font-size="22" font-weight="700" fill="#1d4ed8">冲突升级</text>
  <text x="106" y="260" font-size="16" fill="#1e293b">空袭、护航、海峡受扰</text>

  <rect x="310" y="180" width="190" height="120" rx="18" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="344" y="228" font-size="22" font-weight="700" fill="#b91c1c">油 / LNG / 航运</text>
  <text x="340" y="260" font-size="16" fill="#1e293b">能源、保险、运费上升</text>

  <rect x="560" y="180" width="190" height="120" rx="18" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="592" y="228" font-size="22" font-weight="700" fill="#a16207">通胀预期</text>
  <text x="600" y="260" font-size="16" fill="#1e293b">CPI / PCE 路径抬高</text>

  <rect x="810" y="180" width="190" height="120" rx="18" fill="#dcfce7" stroke="#86efac"/>
  <text x="856" y="228" font-size="22" font-weight="700" fill="#166534">Fed / 美债</text>
  <text x="837" y="260" font-size="16" fill="#1e293b">降息推迟，收益率上行</text>

  <rect x="1060" y="180" width="100" height="120" rx="18" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="1085" y="228" font-size="22" font-weight="700" fill="#6d28d9">美元</text>
  <text x="1078" y="260" font-size="16" fill="#1e293b">偏强</text>

  <line x1="250" y1="240" x2="310" y2="240" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="500" y1="240" x2="560" y2="240" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="750" y1="240" x2="810" y2="240" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1000" y1="240" x2="1060" y2="240" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="90" y="430" width="220" height="190" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="120" y="470" font-size="24" font-weight="700" fill="#0f172a">受益方向</text>
  <text x="120" y="508" font-size="17" fill="#1e293b">• 能源</text>
  <text x="120" y="536" font-size="17" fill="#1e293b">• 黄金</text>
  <text x="120" y="564" font-size="17" fill="#1e293b">• 网络安全</text>
  <text x="120" y="592" font-size="17" fill="#1e293b">• 国防科技</text>

  <rect x="360" y="430" width="240" height="190" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="390" y="470" font-size="24" font-weight="700" fill="#0f172a">承压方向</text>
  <text x="390" y="508" font-size="17" fill="#1e293b">• 高久期成长股</text>
  <text x="390" y="536" font-size="17" fill="#1e293b">• 高估值 AI 概念股</text>
  <text x="390" y="564" font-size="17" fill="#1e293b">• 亚洲能源敏感制造链</text>
  <text x="390" y="592" font-size="17" fill="#1e293b">• 航空 / 可选消费</text>

  <rect x="650" y="430" width="220" height="190" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="682" y="470" font-size="24" font-weight="700" fill="#0f172a">美股特征</text>
  <text x="682" y="508" font-size="17" fill="#1e293b">• 美元资产缓冲</text>
  <text x="682" y="536" font-size="17" fill="#1e293b">• 能源板块对冲</text>
  <text x="682" y="564" font-size="17" fill="#1e293b">• 科技龙头现金流强</text>

  <rect x="920" y="430" width="220" height="190" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="952" y="470" font-size="24" font-weight="700" fill="#0f172a">港股特征</text>
  <text x="952" y="508" font-size="17" fill="#1e293b">• 风险偏好敏感</text>
  <text x="952" y="536" font-size="17" fill="#1e293b">• 亚洲能源进口压力</text>
  <text x="952" y="564" font-size="17" fill="#1e293b">• 外资流动性影响更大</text>

  <line x1="655" y1="300" x2="655" y2="380" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="690" y="360" font-size="18" fill="#334155">最终落到盈利与估值</text>
</svg>