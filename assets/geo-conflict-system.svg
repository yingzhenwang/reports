<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="60" font-size="30" font-weight="700" fill="#0f172a">美伊冲突地缘政治结构图</text>
  <text x="60" y="92" font-size="16" fill="#475569">关键问题不是单点军事打击，而是冲突是否穿透至海上 chokepoint、代理网络与地区秩序。</text>

  <rect x="60" y="140" rx="18" ry="18" width="250" height="185" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="85" y="178" font-size="24" font-weight="700" fill="#1d4ed8">美国 / 以色列</text>
  <text x="85" y="212" font-size="17" fill="#1e293b">• 压缩伊朗核突破时间</text>
  <text x="85" y="240" font-size="17" fill="#1e293b">• 恢复威慑可信度</text>
  <text x="85" y="268" font-size="17" fill="#1e293b">• 维持地区秩序与盟友信心</text>
  <text x="85" y="296" font-size="17" fill="#1e293b">• 避免长期地面战争泥潭</text>

  <rect x="890" y="140" rx="18" ry="18" width="250" height="185" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="925" y="178" font-size="24" font-weight="700" fill="#b91c1c">伊朗</text>
  <text x="915" y="212" font-size="17" fill="#1e293b">• 维持政权生存</text>
  <text x="915" y="240" font-size="17" fill="#1e293b">• 保住核与导弹主权象征</text>
  <text x="915" y="268" font-size="17" fill="#1e293b">• 证明自身仍具报复能力</text>
  <text x="915" y="296" font-size="17" fill="#1e293b">• 把成本外溢到更大区域</text>

  <rect x="390" y="150" rx="20" ry="20" width="420" height="165" fill="#0f172a" opacity="0.96"/>
  <text x="420" y="190" font-size="26" font-weight="700" fill="#ffffff">战略交汇点</text>
  <text x="420" y="225" font-size="18" fill="#e2e8f0">核能力、导弹能力、代理网络、威慑可信度</text>
  <text x="420" y="255" font-size="18" fill="#e2e8f0">冲突的决定性变量不是“是否继续互炸”，</text>
  <text x="420" y="283" font-size="18" fill="#e2e8f0">而是是否跨越海峡、能源设施与多战线升级门槛。</text>

  <rect x="90" y="405" rx="18" ry="18" width="280" height="220" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="118" y="442" font-size="23" font-weight="700" fill="#0f766e">海湾国家</text>
  <text x="118" y="476" font-size="17" fill="#1e293b">• 依赖美国安全保护</text>
  <text x="118" y="504" font-size="17" fill="#1e293b">• 不愿本土成为主战场</text>
  <text x="118" y="532" font-size="17" fill="#1e293b">• 核心关切是能源设施安全</text>
  <text x="118" y="560" font-size="17" fill="#1e293b">• 倾向推动降级而非全面站队</text>
  <text x="118" y="588" font-size="17" fill="#1e293b">• 既怕美国失手，也怕伊朗失控</text>

  <rect x="455" y="385" rx="18" ry="18" width="290" height="250" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="422" font-size="23" font-weight="700" fill="#7c3aed">关键 chokepoints</text>
  <text x="490" y="458" font-size="17" fill="#1e293b">1. 霍尔木兹海峡</text>
  <text x="490" y="486" font-size="17" fill="#1e293b">2. 红海与曼德海峡</text>
  <text x="490" y="514" font-size="17" fill="#1e293b">3. 海湾油气设施与港口</text>
  <text x="490" y="542" font-size="17" fill="#1e293b">4. 黎巴嫩北线与东地中海</text>
  <text x="490" y="580" font-size="17" fill="#475569">这些节点决定冲突是</text>
  <text x="490" y="606" font-size="17" fill="#475569">“有限战争”还是“系统性危机”。</text>

  <rect x="840" y="405" rx="18" ry="18" width="290" height="220" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="870" y="442" font-size="23" font-weight="700" fill="#92400e">代理网络 / 外溢</text>
  <text x="870" y="476" font-size="17" fill="#1e293b">• 真主党（黎巴嫩）</text>
  <text x="870" y="504" font-size="17" fill="#1e293b">• 伊拉克亲伊朗武装</text>
  <text x="870" y="532" font-size="17" fill="#1e293b">• 胡塞武装（红海）</text>
  <text x="870" y="560" font-size="17" fill="#1e293b">• 网络攻击与灰区行动</text>
  <text x="870" y="588" font-size="17" fill="#1e293b">• 中俄政治与经济缓冲</text>

  <line x1="310" y1="232" x2="390" y2="232" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="810" y1="232" x2="890" y2="232" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="315" x2="600" y2="385" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="370" y1="515" x2="455" y2="515" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="745" y1="515" x2="840" y2="515" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="60" y="670" rx="14" ry="14" width="1080" height="56" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="86" y="705" font-size="18" font-weight="700" fill="#1e3a8a">解读：</text>
  <text x="148" y="705" font-size="18" fill="#1e3a8a">只要霍尔木兹、海湾能源设施与代理战线三者没有同步失控，冲突更可能维持在“高烈度但受控”的区间；反之就会升级为地区秩序危机。</text>
</svg>