<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="60" y="60" font-size="30" font-weight="700" fill="#0f172a">AI 产业链受冲击与受益矩阵</text>
  <text x="60" y="92" font-size="16" fill="#475569">横轴表示短期盈利/估值压力，纵轴表示中期需求韧性与受益程度。</text>
  <line x1="170" y1="650" x2="1080" y2="650" stroke="#334155" stroke-width="3"/>
  <line x1="170" y1="650" x2="170" y2="150" stroke="#334155" stroke-width="3"/>
  <text x="520" y="712" font-size="20" font-weight="700" fill="#1e293b">短期压力（从低到高）</text>
  <text x="86" y="430" font-size="20" font-weight="700" fill="#1e293b" transform="rotate(-90 86 430)">中期韧性 / 受益（从低到高）</text>

  <rect x="260" y="220" width="220" height="92" rx="18" fill="#dcfce7" stroke="#86efac"/>
  <text x="295" y="258" font-size="22" font-weight="700" fill="#166534">网络安全</text>
  <text x="286" y="287" font-size="16" fill="#1e293b">国家级攻击与防护需求上升</text>

  <rect x="520" y="250" width="260" height="92" rx="18" fill="#dcfce7" stroke="#86efac"/>
  <text x="547" y="288" font-size="22" font-weight="700" fill="#166534">电力 / 冷却 / 基础设施</text>
  <text x="548" y="317" font-size="16" fill="#1e293b">冗余建设与安全性需求提升</text>

  <rect x="800" y="265" width="250" height="92" rx="18" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="834" y="303" font-size="22" font-weight="700" fill="#075985">国防科技交叉</text>
  <text x="830" y="332" font-size="16" fill="#1e293b">AI + 情报 + 指挥控制</text>

  <rect x="250" y="430" width="250" height="92" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="295" y="468" font-size="22" font-weight="700" fill="#0f172a">云软件 / SaaS</text>
  <text x="275" y="497" font-size="16" fill="#1e293b">相对中性，取决于企业开支与利率</text>

  <rect x="565" y="450" width="250" height="92" rx="18" fill="#ffedd5" stroke="#fdba74"/>
  <text x="618" y="488" font-size="22" font-weight="700" fill="#9a3412">Hyperscalers</text>
  <text x="592" y="517" font-size="16" fill="#1e293b">capex 重、能耗高、但现金流强</text>

  <rect x="840" y="495" width="250" height="92" rx="18" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="868" y="533" font-size="22" font-weight="700" fill="#991b1b">高估值 AI 概念股</text>
  <text x="885" y="562" font-size="16" fill="#1e293b">最怕利率重定价</text>

  <rect x="620" y="585" width="250" height="92" rx="18" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="663" y="623" font-size="22" font-weight="700" fill="#991b1b">半导体 / 存储</text>
  <text x="644" y="652" font-size="16" fill="#1e293b">受油价、材料、制造成本影响</text>

  <rect x="900" y="585" width="200" height="92" rx="18" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="922" y="623" font-size="22" font-weight="700" fill="#991b1b">韩国芯片链</text>
  <text x="925" y="652" font-size="16" fill="#1e293b">能源敏感度更高</text>

  <rect x="180" y="680" width="920" height="46" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="210" y="710" font-size="17" fill="#334155">核心结论：AI 板块不是整体利空；真正有机会跑赢的是“安全、基础设施、军民两用技术”，而不是所有高估值 AI 叙事资产。</text>
</svg>